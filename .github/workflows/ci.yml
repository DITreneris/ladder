name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: >-
          pip-audit -r requirements.txt
          --ignore-vuln GHSA-2c2j-9gv5-cj73
          --ignore-vuln GHSA-7f5h-v6xp-fcq8
          --ignore-vuln PYSEC-2026-161
      - run: python -m pytest

  bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest

  mini-app:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'https://ladder-production-642d.up.railway.app' }}
    defaults:
      run:
        working-directory: apps/mini-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mini-app/package-lock.json
      - run: npm ci
      - name: Verify VITE_API_URL for production build
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL must be set for CI build"
            exit 1
          fi
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - name: Playwright QA (viewport, layout, coffee)
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 --strictPort &
          PREVIEW_PID=$!
          export PREVIEW_URL=http://127.0.0.1:4173
          for i in $(seq 1 30); do
            curl -sf "$PREVIEW_URL" >/dev/null && break
            sleep 1
          done
          curl -sf "$PREVIEW_URL" >/dev/null || (echo "Preview failed to start at $PREVIEW_URL" && exit 1)
          npm run qa:viewport
          npm run qa:layout
          npm run qa:coffee || npm run qa:coffee
          npm run verify:seo:live
          kill "$PREVIEW_PID" 2>/dev/null || true
      - name: OG asset check
        run: npm run verify:og
      - name: SEO asset check
        run: npm run verify:seo
