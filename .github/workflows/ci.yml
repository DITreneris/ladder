name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest

  bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -c "import main"

  mini-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mini-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mini-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - name: Playwright QA (viewport, layout, coffee)
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 --strictPort &
          PREVIEW_PID=$!
          sleep 5
          export PREVIEW_URL=http://127.0.0.1:4173
          npm run qa:viewport
          npm run qa:layout
          npm run qa:coffee
          kill "$PREVIEW_PID" 2>/dev/null || true
      - name: OG asset check
        run: npm run verify:og
      - name: SEO asset check
        run: npm run verify:seo
