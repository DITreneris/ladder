<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, height=630" />
    <title>Corporate Ladder — OG Preview</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="og-preview-body">
    <div id="ogCanvas" class="og-preview-canvas">
      <div class="og-preview-left office-grid-reorg-week">
        <div class="og-preview-brand">
          <div class="og-preview-icon">
            <i class="fa-solid fa-briefcase"></i>
          </div>
          <h1 class="og-preview-title">
            CORPORATE<br /><span class="og-preview-title-accent">LADDER</span>
          </h1>
          <p class="og-preview-tagline">Simulating modern work chaos</p>
        </div>
        <p class="og-preview-hook">One tap, one rung. Don&apos;t attend the meeting.</p>
        <div class="og-preview-shift">
          <span class="og-preview-shift-label">Reorg Week</span>
          <span class="og-preview-shift-desc">Org chart unstable. Reporting lines are suggestions.</span>
        </div>
        <div class="og-preview-cta">
          <p class="og-preview-cta-label">Play in Telegram</p>
          <p class="og-preview-cta-handle">
            <span class="og-preview-cta-dot"></span>
            @CorporateLadderBot
          </p>
        </div>
      </div>
      <div class="og-preview-right">
        <div class="og-preview-phone">
          <div class="og-preview-phone-notch"></div>
          <img
            id="ogGameplayCrop"
            src="/og-cache/gameplay-crop.png"
            alt="Corporate Ladder gameplay"
            width="320"
            height="420"
          />
        </div>
      </div>
    </div>
    <script type="module" src="/src/og-preview.ts"></script>
  </body>
</html>
